<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitzungszimmer Reservierung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ec;
    --ink: #1a1714;
    --muted: #7a7169;
    --border: #ddd8cf;
    --white: #fffef9;
    --accent-a: #c0392b;
    --accent-b: #1a5276;
    --accent-c: #1e8449;
    --success: #27ae60;
    --warning: #e67e22;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--white);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    letter-spacing: .02em;
  }
  header .company-badge {
    font-size: .75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .12em;
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(255,255,255,.12);
  }
  header .company-badge.A { background: var(--accent-a); }
  header .company-badge.B { background: var(--accent-b); }
  header .company-badge.C { background: var(--accent-c); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }
  .tab-btn {
    padding: 14px 24px;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
  .tab-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-A { background: var(--accent-a); }
  .dot-B { background: var(--accent-b); }
  .dot-C { background: var(--accent-c); }

  /* ── MAIN ── */
  main { max-width: 1100px; margin: 0 auto; padding: 32px; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .company-stripe {
    width: 4px; height: 28px; border-radius: 2px;
  }
  .stripe-A { background: var(--accent-a); }
  .stripe-B { background: var(--accent-b); }
  .stripe-C { background: var(--accent-c); }

  /* ── FORM CARD ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 28px;
  }
  .card h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 20px; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: .8rem; font-weight: 500; color: var(--muted); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    color: var(--ink);
    background: var(--bg);
    transition: border-color .2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--ink);
    background: var(--white);
  }
  .form-group.full { grid-column: 1 / -1; }
  textarea { resize: vertical; min-height: 70px; }

  .btn {
    padding: 11px 28px;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--ink); color: var(--white); }
  .btn-primary:hover { background: #333; }
  .btn-primary.A { background: var(--accent-a); }
  .btn-primary.A:hover { background: #a93226; }
  .btn-primary.B { background: var(--accent-b); }
  .btn-primary.B:hover { background: #154360; }
  .btn-primary.C { background: var(--accent-c); }
  .btn-primary.C:hover { background: #186a3b; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--ink); border-color: var(--ink); }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; }

  /* ── ROOM CARDS ── */
  .rooms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .room-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .room-card:hover { border-color: var(--ink); }
  .room-card.selected { border-color: var(--ink); box-shadow: inset 0 0 0 1px var(--ink); }
  .room-card .room-color-bar { height: 3px; position: absolute; top: 0; left: 0; right: 0; }
  .room-card h4 { font-weight: 600; font-size: 1rem; margin-bottom: 4px; margin-top: 4px; }
  .room-card .room-cap { font-size: .8rem; color: var(--muted); }
  .room-card .room-features { font-size: .75rem; color: var(--muted); margin-top: 8px; }
  .check-icon { position: absolute; top: 12px; right: 12px; width: 20px; height: 20px; border-radius: 50%; background: var(--ink); display: none; align-items: center; justify-content: center; }
  .room-card.selected .check-icon { display: flex; }
  .check-icon svg { width: 12px; fill: white; }

  /* ── BOOKINGS TABLE ── */
  .bookings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-chip {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: .8rem;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
  }
  .filter-chip:hover, .filter-chip.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .filter-chip.active-A { background: var(--accent-a); color: var(--white); border-color: var(--accent-a); }
  .filter-chip.active-B { background: var(--accent-b); color: var(--white); border-color: var(--accent-b); }
  .filter-chip.active-C { background: var(--accent-c); color: var(--white); border-color: var(--accent-c); }

  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 2px solid var(--border); }
  thead th { text-align: left; padding: 10px 14px; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 500; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: rgba(0,0,0,.02); }
  tbody td { padding: 12px 14px; font-size: .9rem; }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .tag-A { background: #fde8e7; color: var(--accent-a); }
  .tag-B { background: #e8f0fb; color: var(--accent-b); }
  .tag-C { background: #e8f8ed; color: var(--accent-c); }

  .action-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    font-size: .8rem;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
    margin-left: 6px;
  }
  .action-btn:hover { color: #c0392b; border-color: #c0392b; }

  /* ── CALENDAR VIEW ── */
  .cal-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .cal-nav h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; flex: 1; }
  .cal-btn { background: var(--white); border: 1px solid var(--border); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: .85rem; transition: all .15s; }
  .cal-btn:hover { border-color: var(--ink); }

  .calendar { display: flex; flex-direction: column; gap: 2px; }
  .cal-header-row {
    display: grid;
    grid-template-columns: 80px repeat(5, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }
  .cal-header-cell {
    padding: 10px 8px;
    text-align: center;
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
  }
  .cal-header-cell.today-col { color: var(--ink); background: rgba(0,0,0,.04); border-radius: var(--radius); }
  .cal-row {
    display: grid;
    grid-template-columns: 80px repeat(5, 1fr);
    gap: 2px;
    align-items: stretch;
    min-height: 52px;
  }
  .time-label { font-size: .78rem; color: var(--muted); padding: 4px 8px; display: flex; align-items: center; justify-content: flex-end; }
  .cal-cell {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    min-height: 52px;
    cursor: pointer;
    transition: background .1s;
    position: relative;
    overflow: hidden;
  }
  .cal-cell:hover { background: #f0ede6; }
  .cal-event {
    border-radius: 2px;
    padding: 3px 6px;
    font-size: .72rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
    cursor: pointer;
  }
  .ev-A { background: #fde8e7; color: var(--accent-a); }
  .ev-B { background: #e8f0fb; color: var(--accent-b); }
  .ev-C { background: #e8f8ed; color: var(--accent-c); }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 28px; right: 28px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
  .toast {
    background: var(--ink);
    color: var(--white);
    padding: 14px 20px;
    border-radius: var(--radius);
    font-size: .88rem;
    max-width: 320px;
    animation: slideIn .3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
  }
  .toast.success { background: var(--success); }
  .toast.error { background: #c0392b; }
  @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--white);
    border-radius: var(--radius);
    padding: 32px;
    width: 480px;
    max-width: 95vw;
    transform: translateY(16px);
    transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: none; }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 6px; }
  .modal p { font-size: .88rem; color: var(--muted); margin-bottom: 20px; }
  .modal-info { background: var(--bg); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; font-size: .88rem; }
  .modal-info strong { display: block; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 2px; }

  /* ── STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .stat-card .stat-val { font-family: 'DM Serif Display', serif; font-size: 2rem; line-height: 1; margin-bottom: 4px; }
  .stat-card .stat-label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty p { font-size: .9rem; }

  /* ── PAGE SECTIONS ── */
  .page { display: none; }
  .page.active { display: block; }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .tabs { padding: 0 16px; }
    header { padding: 0 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .cal-header-row, .cal-row { grid-template-columns: 48px repeat(5, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>🏢 RoomBook</h1>
  <span class="company-badge" id="header-badge">Firma A</span>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="showPage('buchen')">
    <span class="dot dot-A"></span> Buchen
  </button>
  <button class="tab-btn" onclick="showPage('kalender')">
    📅 Kalender
  </button>
  <button class="tab-btn" onclick="showPage('liste')">
    📋 Alle Buchungen
  </button>
</nav>

<main>

  <!-- ══════════ PAGE: BUCHEN ══════════ -->
  <div id="page-buchen" class="page active">
    <div class="section-title">
      <div class="company-stripe" id="form-stripe"></div>
      Neues Zimmer reservieren
    </div>

    <!-- Firma Auswahl -->
    <div class="card">
      <h3>Firma auswählen</h3>
      <div class="form-grid" style="grid-template-columns: repeat(3,1fr)">
        <button class="btn btn-primary A" onclick="selectCompany('A')">🔴 Firma A</button>
        <button class="btn btn-primary B" onclick="selectCompany('B')">🔵 Firma B</button>
        <button class="btn btn-primary C" onclick="selectCompany('C')">🟢 Firma C</button>
      </div>
    </div>

    <!-- Zimmer Wahl -->
    <div class="card">
      <h3>Sitzungszimmer wählen</h3>
      <div class="rooms-grid" id="rooms-grid"></div>
    </div>

    <!-- Formular -->
    <div class="card">
      <h3>Buchungsdetails</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Name / Verantwortlicher</label>
          <input type="text" id="f-name" placeholder="Max Muster">
        </div>
        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-group">
          <label>Startzeit</label>
          <select id="f-start"></select>
        </div>
        <div class="form-group">
          <label>Endzeit</label>
          <select id="f-end"></select>
        </div>
        <div class="form-group">
          <label>Anzahl Teilnehmer</label>
          <input type="number" id="f-people" placeholder="5" min="1" max="50">
        </div>
        <div class="form-group full">
          <label>Betreff / Agenda (optional)</label>
          <textarea id="f-note" placeholder="Quartalsbesprechung, Präsentation..."></textarea>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="submit-btn" onclick="submitBooking()">Reservierung bestätigen</button>
        <button class="btn btn-ghost" onclick="resetForm()">Zurücksetzen</button>
      </div>
    </div>
  </div>

  <!-- ══════════ PAGE: KALENDER ══════════ -->
  <div id="page-kalender" class="page">
    <div class="cal-nav">
      <h3 id="cal-title"></h3>
      <button class="cal-btn" onclick="changeWeek(-1)">← Vorwoche</button>
      <button class="cal-btn" onclick="changeWeek(0)">Heute</button>
      <button class="cal-btn" onclick="changeWeek(1)">Nächste →</button>
    </div>
    <div class="card" style="padding:16px; overflow-x:auto">
      <div id="cal-container"></div>
    </div>
  </div>

  <!-- ══════════ PAGE: LISTE ══════════ -->
  <div id="page-liste" class="page">
    <div class="bookings-header">
      <div class="section-title" style="margin-bottom:0">Alle Buchungen</div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="filter-row" style="margin-bottom:18px">
      <button class="filter-chip active" id="chip-all" onclick="filterBookings('all')">Alle</button>
      <button class="filter-chip" id="chip-A" onclick="filterBookings('A')">🔴 Firma A</button>
      <button class="filter-chip" id="chip-B" onclick="filterBookings('B')">🔵 Firma B</button>
      <button class="filter-chip" id="chip-C" onclick="filterBookings('C')">🟢 Firma C</button>
    </div>

    <div class="card" style="padding:0; overflow:hidden">
      <table>
        <thead>
          <tr>
            <th>Firma</th>
            <th>Zimmer</th>
            <th>Name</th>
            <th>Datum</th>
            <th>Zeit</th>
            <th>Personen</th>
            <th>Betreff</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="bookings-tbody"></tbody>
      </table>
      <div id="bookings-empty" class="empty" style="display:none">
        <div class="empty-icon">📭</div>
        <p>Keine Buchungen gefunden</p>
      </div>
    </div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Buchung bestätigt ✓</h2>
    <p id="modal-sub">Ihre Reservierung wurde erfolgreich gespeichert.</p>
    <div class="modal-info" id="modal-info"></div>
    <button class="btn btn-primary" style="width:100%" onclick="closeModal()">Schliessen</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script>
// ── DATA ──
const ROOMS = [
  { id: 'panorama', name: 'Panorama', cap: 12, features: 'Beamer · Whiteboard · Kaffeemaschine' },
  { id: 'alpen',    name: 'Alpenraum', cap: 6,  features: 'TV · Videokonferenz' },
  { id: 'forum',   name: 'Forum',     cap: 20, features: 'Bühne · Mikrofon · Projektion' },
  { id: 'studio',  name: 'Studio',    cap: 4,  features: 'Tischtelefon · Flipchart' },
];

const TIMES = [];
for (let h = 7; h <= 20; h++) {
  TIMES.push(`${String(h).padStart(2,'0')}:00`);
  if (h < 20) TIMES.push(`${String(h).padStart(2,'0')}:30`);
}

const COMPANIES = {
  A: { label: 'Firma A', color: '#c0392b' },
  B: { label: 'Firma B', color: '#1a5276' },
  C: { label: 'Firma C', color: '#1e8449' },
};

let bookings = JSON.parse(localStorage.getItem('rb_bookings') || '[]');
let selectedCompany = 'A';
let selectedRoom = null;
let calWeekOffset = 0;
let activeFilter = 'all';

// ── INIT ──
function init() {
  buildRoomsGrid();
  buildTimeSelects();
  setDefaultDate();
  updateCompanyUI();
  renderCalendar();
  renderStats();
  renderBookings();
}

function buildRoomsGrid() {
  const g = document.getElementById('rooms-grid');
  g.innerHTML = ROOMS.map(r => `
    <div class="room-card ${selectedRoom === r.id ? 'selected' : ''}" id="rc-${r.id}" onclick="selectRoom('${r.id}')">
      <div class="room-color-bar" style="background:${COMPANIES[selectedCompany].color}"></div>
      <div class="check-icon"><svg viewBox="0 0 12 10"><polyline points="1,5 4,8 11,1" fill="none" stroke="white" stroke-width="2"/></svg></div>
      <h4>${r.name}</h4>
      <div class="room-cap">👥 bis ${r.cap} Personen</div>
      <div class="room-features">${r.features}</div>
    </div>
  `).join('');
}

function buildTimeSelects() {
  ['f-start','f-end'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = TIMES.map(t => `<option value="${t}">${t}</option>`).join('');
  });
  document.getElementById('f-start').value = '09:00';
  document.getElementById('f-end').value   = '10:00';
}

function setDefaultDate() {
  const today = new Date();
  document.getElementById('f-date').value = today.toISOString().split('T')[0];
}

// ── COMPANY & ROOM ──
function selectCompany(c) {
  selectedCompany = c;
  updateCompanyUI();
  buildRoomsGrid();
  if (selectedRoom) selectRoom(selectedRoom);
}

function updateCompanyUI() {
  const badge = document.getElementById('header-badge');
  badge.className = 'company-badge ' + selectedCompany;
  badge.textContent = COMPANIES[selectedCompany].label;

  const stripe = document.getElementById('form-stripe');
  stripe.className = 'company-stripe stripe-' + selectedCompany;

  const btn = document.getElementById('submit-btn');
  btn.className = 'btn btn-primary ' + selectedCompany;
}

function selectRoom(id) {
  selectedRoom = id;
  document.querySelectorAll('.room-card').forEach(el => el.classList.remove('selected'));
  const card = document.getElementById('rc-' + id);
  if (card) card.classList.add('selected');
}

// ── FORM ──
function submitBooking() {
  const name  = document.getElementById('f-name').value.trim();
  const date  = document.getElementById('f-date').value;
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const ppl   = document.getElementById('f-people').value;
  const note  = document.getElementById('f-note').value.trim();

  if (!name)         return toast('Bitte Namen eingeben.', 'error');
  if (!date)         return toast('Bitte Datum wählen.', 'error');
  if (!selectedRoom) return toast('Bitte ein Zimmer wählen.', 'error');
  if (start >= end)  return toast('Endzeit muss nach Startzeit liegen.', 'error');

  // Conflict check
  const conflict = bookings.find(b =>
    b.room === selectedRoom && b.date === date &&
    !(end <= b.start || start >= b.end)
  );
  if (conflict) return toast(`Konflikt: ${conflict.company} hat "${conflict.name}" zu dieser Zeit gebucht.`, 'error');

  const room = ROOMS.find(r => r.id === selectedRoom);
  const booking = {
    id: Date.now(),
    company: selectedCompany,
    room: selectedRoom,
    roomName: room.name,
    name, date, start, end,
    people: ppl || '–',
    note
  };

  bookings.push(booking);
  save();

  showModal(booking);
  resetForm();
  renderCalendar();
  renderStats();
  renderBookings();
}

function resetForm() {
  document.getElementById('f-name').value  = '';
  document.getElementById('f-people').value = '';
  document.getElementById('f-note').value  = '';
  setDefaultDate();
  document.getElementById('f-start').value = '09:00';
  document.getElementById('f-end').value   = '10:00';
  selectedRoom = null;
  buildRoomsGrid();
}

function deleteBooking(id) {
  bookings = bookings.filter(b => b.id !== id);
  save();
  renderBookings();
  renderStats();
  renderCalendar();
  toast('Buchung gelöscht.', 'success');
}

// ── CALENDAR ──
function changeWeek(dir) {
  if (dir === 0) calWeekOffset = 0;
  else calWeekOffset += dir;
  renderCalendar();
}

function getWeekDays(offset) {
  const today = new Date();
  const dow = today.getDay() || 7;
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow + 1 + offset * 7);
  return Array.from({length:5}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function fmt(d) {
  return d.toISOString().split('T')[0];
}

function renderCalendar() {
  const days = getWeekDays(calWeekOffset);
  const todayStr = fmt(new Date());
  const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const DAYS = ['Mo','Di','Mi','Do','Fr'];

  const title = `${days[0].getDate()}. ${MONTHS[days[0].getMonth()]} – ${days[4].getDate()}. ${MONTHS[days[4].getMonth()]} ${days[4].getFullYear()}`;
  document.getElementById('cal-title').textContent = title;

  const SHOW_HOURS = [];
  for (let h = 7; h <= 19; h++) SHOW_HOURS.push(h);

  let html = '<div class="cal-header-row">';
  html += '<div></div>';
  days.forEach((d,i) => {
    const isToday = fmt(d) === todayStr;
    html += `<div class="cal-header-cell ${isToday ? 'today-col' : ''}">${DAYS[i]}<br>${d.getDate()}.${d.getMonth()+1}</div>`;
  });
  html += '</div><div class="calendar">';

  SHOW_HOURS.forEach(h => {
    html += '<div class="cal-row">';
    html += `<div class="time-label">${String(h).padStart(2,'0')}:00</div>`;
    days.forEach(d => {
      const dateStr = fmt(d);
      const dayBookings = bookings.filter(b => {
        if (b.date !== dateStr) return false;
        const bs = parseInt(b.start), be = parseInt(b.end);
        return bs <= h && be > h;
      });
      html += `<div class="cal-cell">`;
      dayBookings.forEach(b => {
        html += `<div class="cal-event ev-${b.company}" title="${b.name} – ${b.start}–${b.end}">${b.roomName}: ${b.name}</div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';

  document.getElementById('cal-container').innerHTML = html;
}

// ── BOOKINGS LIST ──
function filterBookings(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.className = 'filter-chip';
    if (c.id === 'chip-' + f) c.classList.add('active' + (f !== 'all' ? '-' + f : ''));
  });
  renderBookings();
}

function renderBookings() {
  const filtered = activeFilter === 'all' ? bookings : bookings.filter(b => b.company === activeFilter);
  const sorted = [...filtered].sort((a,b) => (a.date+a.start) > (b.date+b.start) ? -1 : 1);
  const tbody = document.getElementById('bookings-tbody');
  const empty = document.getElementById('bookings-empty');

  if (sorted.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = sorted.map(b => `
    <tr>
      <td><span class="tag tag-${b.company}">${COMPANIES[b.company].label}</span></td>
      <td><strong>${b.roomName}</strong></td>
      <td>${b.name}</td>
      <td>${formatDate(b.date)}</td>
      <td>${b.start} – ${b.end}</td>
      <td>${b.people}</td>
      <td style="color:var(--muted);font-size:.85rem">${b.note || '–'}</td>
      <td><button class="action-btn" onclick="deleteBooking(${b.id})">✕</button></td>
    </tr>
  `).join('');
}

function renderStats() {
  const row = document.getElementById('stats-row');
  const total = bookings.length;
  const perCompany = Object.entries(COMPANIES).map(([k,v]) => ({
    ...v, key: k, count: bookings.filter(b => b.company === k).length
  }));
  const today = bookings.filter(b => b.date === fmt(new Date())).length;

  row.innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${total}</div>
      <div class="stat-label">Buchungen total</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${today}</div>
      <div class="stat-label">Heute</div>
    </div>
    ${perCompany.map(c => `
    <div class="stat-card">
      <div class="stat-val" style="color:${c.color}">${c.count}</div>
      <div class="stat-label">${c.label}</div>
    </div>`).join('')}
  `;
}

// ── MODAL ──
function showModal(b) {
  document.getElementById('modal-title').textContent = 'Buchung bestätigt ✓';
  document.getElementById('modal-sub').textContent = `${COMPANIES[b.company].label} – ${b.roomName}`;
  document.getElementById('modal-info').innerHTML = `
    <strong>Raum</strong>${b.roomName}
    <br><strong style="margin-top:10px;display:block">Datum</strong>${formatDate(b.date)}
    <br><strong style="margin-top:10px;display:block">Zeit</strong>${b.start} – ${b.end}
    <br><strong style="margin-top:10px;display:block">Reserviert von</strong>${b.name}
    ${b.note ? `<br><strong style="margin-top:10px;display:block">Betreff</strong>${b.note}` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── UTILS ──
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['buchen','kalender','liste'][i] === p);
  });
  if (p === 'kalender') renderCalendar();
  if (p === 'liste') renderBookings();
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function toast(msg, type = '') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function save() {
  localStorage.setItem('rb_bookings', JSON.stringify(bookings));
}

// ── CLOSE MODAL ON OVERLAY CLICK ──
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
